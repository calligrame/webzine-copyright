<!doctype html>
<html lang="ko" data-base=".." data-script="sub">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>일상 속 저작권, 박물관으로 스며들다 | 저작권문화</title>
    <meta
      name="description"
      content="생성형 AI가 학습 과정에서 타인의 저작물을 활용하는 것이 허용되는지, AI가 만들어 낸 결과물에 저작권을 인정할 수 있는지를 중심으로 최근 주요 판례와 쟁점을 살펴본다."
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/sub.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <div id="site-header"></div>

    <!-- ===== ARTICLE HERO ===== -->
    <section class="article-hero">
      <div
        class="img-ph article-hero-img"
        style="
          background-image: url(../img/sub15/header.jpg);
          background-position: center center;
          background-repeat: no-repeat;
        "
      ></div>
      <div class="article-hero-overlay"></div>
      <div class="article-hero-bottom">
        <div class="article-hero-inner">
          <div class="article-hero-text">
            <span class="article-hero-category">역사 속 저작권</span>

            <h1 class="article-hero-title">
              일상 속 저작권, 박물관으로 스며들다
            </h1>
            <p class="article-hero-author">
              글 | <strong>소지현</strong> 국립저작권박물관 주임 / 학예연구사
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== ARTICLE BODY ===== -->
    <div class="article-outer">
      <div class="article-container">
        <!-- SIDEBAR -->
        <aside class="article-sidebar" id="article-sidebar">
          <nav class="quick-nav" id="quick-nav" aria-label="빠른 이동">
            <ul>
              <li>
                <a href="#sec-lead" class="qnav-link" data-target="sec-lead"
                  >들어가며</a
                >
              </li>
              <li>
                <a href="#section1" class="qnav-link" data-target="section1"
                  >본문</a
                >
              </li>
            </ul>
          </nav>
        </aside>

        <!-- ARTICLE CONTENT -->
        <article class="article-content" id="article-content">
          <!-- Controls -->
          <div class="article-controls">
            <button class="ctrl-btn ctrl-play" aria-label="읽어주기">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                width="13"
                height="13"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button
              class="ctrl-btn ctrl-font ctrl-font-sm"
              data-size="sm"
              aria-label="글자 작게"
            >
              가
            </button>
            <button
              class="ctrl-btn ctrl-font ctrl-font-lg"
              data-size="lg"
              aria-label="글자 크게"
            >
              가
            </button>
          </div>
          <!-- Lead Text -->
          <div class="article-lead scroll-reveal" id="sec-lead">
            <p>
              2025년 국립저작권박물관은 저작권을 어려운 제도가 아닌, 일상 속
              창작의 가치를 전하는 공간으로 한 걸음 나아갔다. 특히, 타 기관과의
              협력망을 구축하고, 연계 사업을 확대하며 박물관의 외연을 확장한 한
              해였다. 2026년에도 국립저작권박물관은 다양한 사업을 통해 저작권의
              가치를 모두가 공감할 수 있도록 노력할 예정이다.
            </p>
          </div>
          <!-- Section 01 -->
          <section class="article-section scroll-reveal" id="section1">
            <div class="article-section-body">
              <div class="article-inline-img">
                <img src="../img/sub15/sub15-1.jpg" alt="" />
              </div>
            </div>
          </section>
        </article>
      </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
